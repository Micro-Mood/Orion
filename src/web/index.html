<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/vs2015.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
    <div id="app">
        <!-- 活动栏 (最左侧图标条) -->
        <div class="activity-bar">
            <div class="activity-top">
                <button class="activity-btn" :class="{ active: activeView === 'chat' }"
                        @click="activeView = 'chat'" title="对话">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                    </svg>
                </button>
                <button class="activity-btn" :class="{ active: activeView === 'files' }"
                        @click="activeView = 'files'" title="工作区">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                    </svg>
                </button>
            </div>
            <div class="activity-bottom">
                <button class="activity-btn" @click="activeView = 'settings'" title="设置">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 侧边栏 -->
        <aside class="sidebar" :class="{ hidden: !sidebarVisible }">
            <!-- 对话列表视图 -->
            <template v-if="activeView === 'chat'">
                <div class="sidebar-header">
                    <span class="sidebar-title">对话</span>
                    <button class="action-btn" @click="createSession" title="新对话">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </button>
                </div>
                <div class="sidebar-content">
                    <div v-for="s in sessions" :key="s.id"
                         class="tree-item"
                         :class="{ active: s.id === activeSessionId }"
                         @click="switchSession(s.id)">
                        <svg class="tree-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                        </svg>
                        <span class="tree-label">{{ s.title || '新对话' }}</span>
                        <span class="tree-meta">{{ formatTime(s.updated_at) }}</span>
                        <button class="tree-action" @click.stop="deleteSession(s.id)" title="删除">
                            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>
                    <div v-if="sessions.length === 0" class="sidebar-empty">
                        <p>还没有对话</p>
                        <button class="btn-text" @click="createSession">创建新对话</button>
                    </div>
                </div>
            </template>

            <!-- 工作区视图 (Phase 2 placeholder) -->
            <template v-if="activeView === 'files'">
                <div class="sidebar-header">
                    <span class="sidebar-title">工作区</span>
                </div>
                <div class="sidebar-content">
                    <div class="sidebar-empty">
                        <p>工作区文件浏览</p>
                        <p class="text-muted">即将到来</p>
                    </div>
                </div>
            </template>

            <!-- 设置视图 -->
            <template v-if="activeView === 'settings'">
                <div class="sidebar-header">
                    <span class="sidebar-title">设置</span>
                </div>
                <div class="sidebar-content">
                    <div class="sidebar-empty">
                        <p class="text-muted">即将到来</p>
                    </div>
                </div>
            </template>
        </aside>

        <!-- 拖拽分割线 -->
        <div class="sash" v-show="sidebarVisible" @mousedown="startResize"></div>

        <!-- 移动端遮罩 -->
        <div class="sidebar-backdrop" @click="sidebarVisible = false"></div>

        <!-- 主编辑区 -->
        <main class="editor-area">
            <!-- 标题栏 -->
            <div class="title-bar">
                <button class="action-btn" @click="sidebarVisible = !sidebarVisible" title="切换侧边栏">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="9" y1="3" x2="9" y2="21"/>
                    </svg>
                </button>
                <span class="title-text">{{ activeSessionTitle || 'Orion' }}</span>
            </div>

            <!-- 空状态 -->
            <div v-if="!activeSessionId" class="welcome">
                <div class="welcome-logo"><img :src="aiAvatar" alt="Orion" width="64" height="64"></div>
                <h1>Orion</h1>
                <p class="welcome-sub">你的私人 AI 助手</p>
                <div class="welcome-actions">
                    <button class="welcome-btn" @click="createSession">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        新对话
                    </button>
                </div>
                <div class="welcome-shortcuts">
                    <div class="shortcut-item">
                        <kbd>Enter</kbd> <span>发送消息</span>
                    </div>
                    <div class="shortcut-item">
                        <kbd>Shift+Enter</kbd> <span>换行</span>
                    </div>
                    <div class="shortcut-item">
                        <kbd>Ctrl+N</kbd> <span>新对话</span>
                    </div>
                </div>
            </div>

            <!-- 对话区 -->
            <template v-else>
                <div class="chat-area" ref="chatArea">
                    <div class="messages">
                        <template v-for="msg in messages" :key="msg.id">
                            <!-- 用户消息 -->
                            <div v-if="msg.role === 'user'" class="msg-row user">
                                <img class="msg-avatar" :src="userAvatar" alt="你">
                                <div class="msg-body">
                                    <div class="msg-content" v-html="renderMarkdown(msg.content)"></div>
                                </div>
                            </div>

                            <!-- AI 消息 -->
                            <div v-if="msg.role === 'assistant'" class="msg-row assistant">
                                <img class="msg-avatar" :src="aiAvatar" alt="AI">
                                <div class="msg-body">
                                    <!-- 工具调用 (Copilot 风格) -->
                                    <div v-if="msg.tool_calls && msg.tool_calls.length" class="tool-calls">
                                        <div v-for="(tc, i) in msg.tool_calls" :key="i"
                                             class="tool-item" :class="[tc.status]"
                                             @click="tc.expanded = !tc.expanded">
                                            <div class="tool-item-header">
                                                <!-- 状态指示 -->
                                                <span class="tool-status">
                                                    <svg v-if="tc.status === 'running'" class="tool-spinner" viewBox="0 0 16 16" width="14" height="14"><circle cx="8" cy="8" r="6" fill="none" stroke="var(--accent)" stroke-width="2" stroke-dasharray="28" stroke-dashoffset="8" stroke-linecap="round"/></svg>
                                                    <svg v-else-if="tc.status === 'success'" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="var(--success)" stroke-width="2"><polyline points="4 8 7 11 12 5"/></svg>
                                                    <svg v-else viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="var(--error)" stroke-width="2"><line x1="5" y1="5" x2="11" y2="11"/><line x1="11" y1="5" x2="5" y2="11"/></svg>
                                                </span>
                                                <!-- 工具图标 -->
                                                <span class="tool-icon" :class="toolIconClass(tc.name)"></span>
                                                <!-- 描述文本 -->
                                                <span class="tool-text">{{ toolLabel(tc) }}</span>
                                                <!-- 耗时 -->
                                                <span v-if="tc.duration" class="tool-duration">{{ tc.duration }}ms</span>
                                                <!-- 展开箭头 -->
                                                <svg class="tool-chevron" :class="{ rotated: tc.expanded }" viewBox="0 0 16 16" width="12" height="12" fill="currentColor">
                                                    <path d="M7.976 10.072l4.357-4.357.62.618L8.284 11h-.618L3 6.333l.619-.618 4.357 4.357z"/>
                                                </svg>
                                            </div>
                                            <!-- 展开详情 -->
                                            <div v-if="tc.expanded" class="tool-item-detail" @click.stop>
                                                <!-- 文件类工具：显示内容预览 -->
                                                <pre v-if="isCodeResult(tc)" class="tool-preview">{{ truncate(tc.result, 800) }}</pre>
                                                <!-- 搜索类工具：显示结果摘要 -->
                                                <div v-else-if="tc.result && typeof tc.result === 'string'" class="tool-result-text">{{ truncate(tc.result, 500) }}</div>
                                                <!-- 其他：JSON 参数 + 结果 -->
                                                <div v-else>
                                                    <div v-if="tc.params" class="tool-section">
                                                        <span class="tool-label">参数</span>
                                                        <pre class="tool-json">{{ formatJSON(tc.params) }}</pre>
                                                    </div>
                                                    <div v-if="tc.result" class="tool-section">
                                                        <span class="tool-label">结果</span>
                                                        <pre class="tool-json">{{ truncate(tc.result, 500) }}</pre>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- 文本 -->
                                    <div v-if="msg.content" class="msg-content" v-html="renderMarkdown(msg.content)"></div>
                                    <span v-if="msg.streaming" class="cursor"></span>
                                </div>
                            </div>
                        </template>

                        <!-- 思考中 -->
                        <div v-if="isProcessing && !hasStreamingMessage" class="msg-row assistant">
                            <img class="msg-avatar" :src="aiAvatar" alt="AI">
                            <div class="msg-body">
                                <div class="thinking">
                                    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 输入区 -->
                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea
                            ref="inputBox"
                            v-model="inputText"
                            @keydown="handleKeydown"
                            placeholder="向 Orion 提问..."
                            rows="1"
                            :disabled="isProcessing"
                        ></textarea>
                        <div class="input-actions">
                            <button class="action-btn send-btn" @click="sendMessage" :disabled="!canSend" title="发送 (Enter)">
                                <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
                                    <path d="M.989 8 .064 2.68a1.342 1.342 0 011.85-1.46l13.02 5.787a1 1 0 010 1.827L1.913 14.62a1.342 1.342 0 01-1.85-1.46L.99 8zm1.012.416l-.053.744a.342.342 0 00.47.372L12.2 8H1.945l.056.416z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </main>
    </div>

    <!-- 状态栏 -->
    <footer id="statusbar">
        <div class="status-left">
            <span class="status-item">qwen-flash</span>
        </div>
        <div class="status-right">
            <span class="status-item" v-if="unreadCount > 0">{{ unreadCount }} 条未读</span>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
